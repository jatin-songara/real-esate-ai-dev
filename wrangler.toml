name = "nuvantasoft-in"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

[build]
command = "npm run build"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
NEXT_PUBLIC_APP_URL = "https://nuvantasoft-in.pages.dev"

# Note: Database is now Supabase — no D1 binding needed.
# AI and Vectorize are still used for semantic search.

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTOR_INDEX"
index_name = "real-estate-listings"
