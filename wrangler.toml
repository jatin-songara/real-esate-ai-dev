name = "nuvantasoft-in"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

[build]
command = "npm run build"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
NEXT_PUBLIC_APP_URL = "https://nuvantasoft-in.pages.dev"

[[d1_databases]]
binding = "DB"
database_name = "real-estate-calling-agent-db"
database_id = "real_estate_d1_id_placeholder"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTOR_INDEX"
index_name = "real-estate-listings"
